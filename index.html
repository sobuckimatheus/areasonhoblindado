<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sueño Blindado - Área de Membros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            color: white;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .modulos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .modulo-card {
            background: white;
            border-radius: 15px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .modulo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .modulo-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .modulo-card h2 {
            color: #667eea;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .modulo-card p {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .modulo-badge {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .modulos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Sueño Blindado</h1>
            <p>Selecione o módulo para acessar as aulas</p>
        </header>

        <div class="modulos-grid">
            <a href="modulo1.html" class="modulo-card">
                <div class="modulo-icon">👶</div>
                <h2>Módulo 1</h2>
                <p>La Regresión de los 4 Meses</p>
                <span class="modulo-badge">2 Vídeos</span>
            </a>

            <a href="modulo2.html" class="modulo-card">
                <div class="modulo-icon">🍼</div>
                <h2>Módulo 2</h2>
                <p>La Regresión de los 8-10 Meses</p>
                <span class="modulo-badge">2 Vídeos</span>
            </a>

            <a href="modulo3.html" class="modulo-card">
                <div class="modulo-icon">🎂</div>
                <h2>Módulo 3</h2>
                <p>La Regresión de los 12 Meses</p>
                <span class="modulo-badge">2 Vídeos</span>
            </a>

            <a href="modulo4.html" class="modulo-card">
                <div class="modulo-icon">🌟</div>
                <h2>Módulo 4</h2>
                <p>La Regresión de los 18 Meses</p>
                <span class="modulo-badge">2 Vídeos</span>
            </a>
        </div>
    </div>
</body>
</html>
