<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo 3 - Sueño Blindado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .modulo {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .modulo-header {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }

        .modulo-header h2 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .modulo-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-button {
            padding: 15px 30px;
            background: transparent;
            border: none;
            color: #666;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            position: relative;
            bottom: -2px;
        }

        .tab-button:hover {
            color: #667eea;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .video-container {
            display: none;
        }

        .video-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid #e0e0e0;
        }

        .nav-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .nav-button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }

        .nav-button.home {
            background: #6c757d;
            box-shadow: 0 4px 10px rgba(108, 117, 125, 0.3);
        }

        .nav-button.home:hover {
            background: #5a6268;
            box-shadow: 0 6px 15px rgba(108, 117, 125, 0.4);
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .modulo {
                padding: 20px;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab-button {
                flex: 1;
                min-width: 120px;
            }

            .navigation {
                flex-direction: column;
            }

            .nav-button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Sueño Blindado</h1>
            <p>Módulo 3</p>
        </header>

        <div class="modulo">
            <div class="modulo-header">
                <h2>Módulo 3</h2>
                <p>La Regresión de los 12 Meses</p>
            </div>

            <div class="tabs">
                <button class="tab-button active" onclick="showVideo(1)">📹 Parte 1</button>
                <button class="tab-button" onclick="showVideo(2)">📹 Parte 2</button>
            </div>

            <div id="video1" class="video-container active">
                <div class="video-wrapper">
                    <iframe
                      src="https://play.tynk.ai/p/fdd49c23-f56a-4a81-a900-fcf47c110e0c"
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                      allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div id="video2" class="video-container">
                <div class="video-wrapper">
                    <iframe
                      src="https://play.tynk.ai/p/89883190-16af-4fb7-89d5-2dd02e786e23"
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                      allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="navigation">
                <a href="modulo2.html" class="nav-button">
                    ← Módulo Anterior
                </a>
                <a href="index.html" class="nav-button home">
                    🏠 Menu
                </a>
                <a href="modulo4.html" class="nav-button">
                    Próximo Módulo →
                </a>
            </div>
        </div>
    </div>

    <script>
        function showVideo(videoNumber) {
            // Hide all videos
            document.querySelectorAll('.video-container').forEach(container => {
                container.classList.remove('active');
            });

            // Remove active from all tabs
            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('active');
            });

            // Show selected video
            document.getElementById('video' + videoNumber).classList.add('active');

            // Activate selected tab
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
